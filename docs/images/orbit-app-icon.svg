<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- app icon background — dark, slight gradient -->
  <rect width="512" height="512" rx="116" fill="#161618"/>
  <rect width="512" height="512" rx="116" fill="url(#bggrad)"/>

  <defs>
    <radialGradient id="bggrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#222224"/>
      <stop offset="100%" stop-color="#0e0e0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- subtle glow behind ring -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glow)"/>

  <!-- thick tilted ring -->
  <ellipse cx="256" cy="256" rx="190" ry="70"
    stroke="#ff6b35" stroke-width="28"
    transform="rotate(-25 256 256)"
    fill="none"/>

  <!-- gap — back portion of ring obscured by planet -->
  <ellipse cx="256" cy="256" rx="190" ry="70"
    stroke="#161618" stroke-width="18"
    stroke-dasharray="108 380"
    stroke-dashoffset="0"
    transform="rotate(-25 256 256)"
    fill="none"/>

  <!-- center node -->
  <circle cx="256" cy="256" r="30" fill="#ff6b35"/>
</svg>
